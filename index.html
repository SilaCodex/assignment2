<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Types Demo - Inline & Internal</title>
    
    <!-- INTERNAL CSS DEMO -->
    <style>
        body {
            background-color: #e3f2fd; /* Light blue background */
            padding: 40px 20px;
            font-family: Arial, sans-serif;
        }
        .registration-section h2 {
            color: #1976d2;
            font-size: 32px;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            font-family: 'Georgia', serif;
            font-weight: bold;
            color: #1565c0;
            font-size: 16px;
            display: block;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #bbdefb;
            border-radius: 8px;
            font-size: 16px;
        }
        .submit-btn {
            background-color: #1976d2;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
        }
        .demo-divider {
            text-align: center;
            margin: 50px 0;
            font-size: 24px;
            color: #666;
        }
    </style>
</head>
<body>

    <!-- INLINE CSS DEMO -->
    <div style="max-width: 800px; margin: 0 auto 50px;">
        <h1 style="color: #d81b60; text-align: center; font-size: 48px; margin-bottom: 30px;">My Profile</h1>
        <p style="font-size: 24px; line-height: 1.6; text-align: center; color: #333;">
            Hello! I'm Marksila, a passionate computer science student exploring web development and database management.
        </p>
        <div style="text-align: center; margin-top: 40px;">
            <button style="background-color: #d81b60; color: white; padding: 15px 40px; border: none; border-radius: 30px; font-size: 20px; cursor: pointer; box-shadow: 0 5px 15px rgba(216,27,96,0.3);">
                Contact Me
            </button>
        </div>
    </div>

    <!-- SEPARATOR -->
    <hr style="border: none; height: 2px; background: linear-gradient(90deg, transparent, #1976d2, transparent); margin: 60px auto; width: 200px;">

    <!-- INTERNAL CSS DEMO -->
    <div class="registration-section">
        <h2>Student Registration</h2>
        <form style="max-width: 500px; margin: 0 auto;">
            <div class="form-group">
                <label for="student-number">Student Number</label>
                <input type="text" id="student-number" name="student-number" placeholder="e.g. CS001">
            </div>
            
            <div class="form-group">
                <label for="telephone">Telephone Number</label>
                <input type="tel" id="telephone" name="telephone" placeholder="0712345678">
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="marksila@example.com">
            </div>
            
            <div class="form-group">
                <button type="submit" class="submit-btn">Submit</button>
            </div>
        </form>
    </div>

</body>
</html>
